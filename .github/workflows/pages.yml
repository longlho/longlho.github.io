name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - run: bazel test //:typecheck //:gazelle.check --lockfile_mode=error
      - run: bazel build //:site --lockfile_mode=error
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
      - name: Prepare Pages artifact
        run: |
          mkdir -p pages-dist
          cp -aL bazel-bin/dist/. pages-dist/
          test -f pages-dist/index.html
          test -f pages-dist/posts/part-1-why-bazel-for-large-frontend-monorepos/index.html
          test -f pages-dist/posts/next-server-actions-are-not-an-api-boundary/index.html
          test -z "$(find pages-dist -type l -print -quit)"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
